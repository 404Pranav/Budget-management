<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeBudget | Sign In</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        },
                        dark: {
                            950: '#030712',
                            900: '#111827',
                            800: '#1f2937',
                            700: '#374151',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-card-glow {
            box-shadow: 0 0 50px -12px rgba(139, 92, 246, 0.2);
        }

        .bg-mesh {
            background-color: #030712;
            background-image:
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(79, 70, 229, 0.1) 0, transparent 50%);
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Custom hide scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #8b5cf6;
            box-shadow: 0 0 20px -5px rgba(139, 92, 246, 0.3);
        }
    </style>
</head>

<body class="bg-mesh text-gray-100 min-h-screen flex items-center justify-center p-0 md:p-6 overflow-hidden">

    <!-- Ambient Glow Backgrounds -->
    <div
        class="fixed top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-primary-600/10 rounded-full blur-[120px] animate-pulse-glow -z-10">
    </div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[35vw] h-[35vw] bg-indigo-600/10 rounded-full blur-[100px] animate-pulse-glow -z-10"
        style="animation-delay: 2s;"></div>

    <main
        class="w-full max-w-[1000px] flex min-h-[650px] glass-panel rounded-none md:rounded-[32px] shadow-2xl overflow-hidden animate-slide-up relative login-card-glow text-gray-100">

        <!-- Left Panel: Brand Visuals -->
        <div
            class="hidden lg:flex w-[45%] relative bg-dark-950/40 p-12 flex-col justify-between overflow-hidden border-r border-white/5">
            <!-- Background Image with Overlay -->
            <div class="absolute inset-0 z-0">
                <img src="assets/images/login-bg.png" alt="Background Visual" class="w-full h-full object-cover grayscale opacity-30">
                <div class="absolute inset-0 bg-gradient-to-t from-dark-950 via-dark-950/40 to-transparent"></div>
            </div>

            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-10">
                    <div
                        class="w-10 h-10 bg-primary-600 rounded-xl flex items-center justify-center shadow-lg shadow-primary-600/20">
                        <i data-lucide="wallet" class="text-white w-6 h-6"></i>
                    </div>
                    <h2 class="text-2xl font-bold tracking-tight">Luxe<span class="text-primary-500">Budget</span></h2>
                </div>

                <h1 class="text-4xl font-bold leading-tight mb-4">Elevate Your <br> <span
                        class="text-transparent bg-clip-text bg-gradient-to-r from-primary-400 to-indigo-400">Financial
                        Style</span></h1>
                <p class="text-gray-400 text-base max-w-xs">Precision tools for the modern wealth builder.</p>
            </div>

            <div class="relative z-10">
                <div class="flex flex-wrap gap-3 mb-6">
                    <div
                        class="px-3 py-1.5 bg-white/5 backdrop-blur-md rounded-full border border-white/10 text-xs flex items-center gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div> Bank-Grade Security
                    </div>
                    <div
                        class="px-3 py-1.5 bg-white/5 backdrop-blur-md rounded-full border border-white/10 text-xs flex items-center gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></div> Real-time Insights
                    </div>
                </div>
            </div>

            <!-- Ambient Shapes -->
            <div
                class="absolute top-1/2 right-[-50px] w-64 h-64 bg-primary-500/10 rounded-full blur-3xl animate-float-slow">
            </div>
        </div>

        <!-- Right Panel: Login Form -->
        <div
            class="w-full lg:w-[55%] p-8 md:p-12 flex flex-col justify-center bg-dark-900/20 overflow-y-auto no-scrollbar">

            <div class="max-w-[400px] mx-auto w-full space-y-8">
                <!-- Mobile/Title Header -->
                <div class="text-center lg:text-left space-y-2">
                    <div class="lg:hidden flex items-center justify-center gap-3 mb-6">
                        <div
                            class="w-10 h-10 bg-primary-600 rounded-xl flex items-center justify-center shadow-lg text-white">
                            <i data-lucide="wallet" class="w-6 h-6"></i>
                        </div>
                        <h2 class="text-2xl font-bold">Luxe<span class="text-primary-500">Budget</span></h2>
                    </div>
                    <h3 class="text-3xl font-bold tracking-tight">Sign In</h3>
                    <p class="text-sm text-gray-400">Welcome back! Please enter your details.</p>
                </div>

                <!-- Social Logins -->
                <div class="grid grid-cols-2 gap-3">
                    <button type="button"
                        class="flex items-center justify-center gap-2 py-3 px-4 glass-input rounded-xl hover:bg-white/5 transition-all text-sm font-medium">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        Google
                    </button>
                    <button type="button"
                        class="flex items-center justify-center gap-2 py-3 px-4 glass-input rounded-xl hover:bg-white/5 transition-all text-sm font-medium">
                        <i data-lucide="apple" class="w-5 h-5 fill-white"></i>
                        Apple
                    </button>
                </div>

                <div class="relative py-2 flex items-center">
                    <div class="flex-grow border-t border-white/5"></div>
                    <span class="mx-4 text-[10px] text-gray-500 uppercase tracking-widest font-bold">Or continue
                        with</span>
                    <div class="flex-grow border-t border-white/5"></div>
                </div>

                <form id="login-form" class="space-y-5">
                    <div class="space-y-1.5">
                        <label for="email"
                            class="text-[11px] font-bold text-gray-400 ml-1 uppercase tracking-widest">Email
                            Address</label>
                        <div class="relative group">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-primary-500 transition-colors">
                                <i data-lucide="mail" class="w-4 h-4"></i>
                            </span>
                            <input type="email" id="email" name="email" required autocomplete="email"
                                class="w-full glass-input rounded-xl py-3.5 pl-11 pr-4 outline-none text-sm text-white"
                                placeholder="name@example.com">
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label for="username"
                            class="text-[11px] font-bold text-gray-400 ml-1 uppercase tracking-widest">Username</label>
                        <div class="relative group">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-primary-500 transition-colors">
                                <i data-lucide="user" class="w-4 h-4"></i>
                            </span>
                            <input type="text" id="username" name="username" required autocomplete="username"
                                class="w-full glass-input rounded-xl py-3.5 pl-11 pr-4 outline-none text-sm text-white"
                                placeholder="your_id">
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center px-1">
                            <label for="password"
                                class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Password</label>
                            <a href="#"
                                class="text-[10px] text-primary-400 hover:text-primary-300 font-bold transition-colors uppercase tracking-widest">Forgot?</a>
                        </div>
                        <div class="relative group">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-primary-500 transition-colors">
                                <i data-lucide="lock" class="w-4 h-4"></i>
                            </span>
                            <input type="password" id="password" name="password" required
                                autocomplete="current-password"
                                class="w-full glass-input rounded-xl py-3.5 pl-11 pr-11 outline-none text-sm text-white"
                                placeholder="••••••••">
                            <button type="button" id="toggle-password"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors">
                                <i data-lucide="eye" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between px-1 pt-1 text-gray-300">
                        <label class="flex items-center group cursor-pointer">
                            <input type="checkbox" id="remember" name="remember"
                                class="w-4 h-4 rounded border-white/10 bg-white/5 text-primary-600 focus:ring-primary-500 focus:ring-offset-dark-950 accent-primary-500 transition-all">
                            <span
                                class="ml-2.5 text-xs text-gray-400 group-hover:text-gray-300 transition-colors">Remember
                                me</span>
                        </label>
                    </div>

                    <button type="submit" id="submit-btn"
                        class="w-full py-4 bg-primary-600 hover:bg-primary-500 rounded-xl font-bold text-sm shadow-xl shadow-primary-600/10 hover:shadow-primary-600/25 active:scale-[0.98] transition-all transform flex items-center justify-center gap-2 text-white">
                        Access Dashboard
                        <i data-lucide="log-in" class="w-4 h-4"></i>
                    </button>
                </form>

                <p class="text-center text-xs text-gray-500 font-medium">
                    New to Luxe<span class="text-primary-500">Budget</span>?
                    <a href="#" class="text-primary-400 hover:text-primary-300 font-bold transition-all ml-1">Create
                        Account</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggle-password');
        const loginForm = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');

        // Toggle Password Visibility
        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');

            // Toggle Icon Data Lucide
            const icon = toggleBtn.querySelector('i');
            icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        // Handle Form Submission
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            // Loading State
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Authenticating...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
            lucide.createIcons();

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1200);
        });
    </script>
</body>

</html>
